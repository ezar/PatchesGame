<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1612">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="icon" href="/icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Patches — A Grid Puzzle</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>body { opacity: 0; }</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <span></span><span></span><span></span><span></span>
    </div>
    <span class="logo-text">Patches</span>
  </div>
  <div class="puzzle-meta" id="puzzle-meta">
    <strong id="puzzle-name">Loading...</strong>
    <span id="puzzle-num"></span>
    <a href="/help.html" style="font-size:11px;color:var(--muted);text-decoration:none;font-family:'DM Mono',monospace;margin-top:2px;display:block;">How to play ↗</a>
  </div>
</header>

<div class="puzzle-nav" id="puzzle-nav"></div>

<div class="rules-card">
  <div class="rules-title">How to play</div>
  <div class="rules-grid">
    <div class="rule-item">
      <div class="shape-icon">
        <div class="si-grid" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;--sic:#e8622a">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
      Square (2×2)
    </div>
    <div class="rule-item">
      <div class="shape-icon">
        <div class="si-grid" style="grid-template-columns:1fr;grid-template-rows:1fr 1fr 1fr;--sic:#2e7d9e">
          <span></span><span></span><span></span>
        </div>
      </div>
      Tall (1×3)
    </div>
    <div class="rule-item">
      <div class="shape-icon">
        <div class="si-grid" style="grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr;--sic:#2d7a4f">
          <span></span><span></span><span></span>
        </div>
      </div>
      Wide (3×1)
    </div>
    <div class="rule-item">
      <div class="shape-icon">
        <div class="si-grid" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;--sic:#7c5cbf">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      Any rectangle
    </div>
  </div>
  <div class="rules-note">Complete each shape to fill the grid. If a shape has a number, it must be that size.</div>
</div>

<div class="board-wrapper">
  <div id="game-board"></div>
</div>

<div class="controls">
  <button id="btn-undo" class="btn">↩ Undo</button>
  <button id="btn-hint" class="btn">💡 Hint</button>
  <button id="btn-reset" class="btn">↺ Reset</button>
  <button id="btn-check" class="btn btn-primary">✓ Check</button>
</div>

<div id="status-bar">Drag to paint regions on the grid</div>

<div class="win-overlay" id="win-overlay">
  <div class="win-card">
    <div class="win-emoji">🎉</div>
    <div class="win-title">Solved!</div>
    <div class="win-sub" id="win-sub">Puzzle complete</div>
    <div class="win-actions">
      <button id="btn-close-win" class="btn">Keep looking</button>
      <button id="btn-next" class="btn btn-primary">Next puzzle →</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
